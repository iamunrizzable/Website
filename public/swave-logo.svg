<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect width="400" height="220" fill="#000000"/>
  <defs>
    <linearGradient id="swaveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4b4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Wave/squiggle shape: two humps up, one valley down in the middle -->
  <path d="
    M 40 140
    C 40 90, 80 60, 110 60
    C 140 60, 160 90, 160 110
    C 160 130, 175 145, 200 145
    C 225 145, 240 130, 240 110
    C 240 90, 260 60, 290 60
    C 320 60, 360 90, 360 140
    C 360 165, 340 175, 320 175
    C 300 175, 280 160, 280 140
    C 280 120, 265 110, 245 110
    C 235 110, 225 120, 220 130
    C 215 140, 210 150, 200 150
    C 190 150, 185 140, 180 130
    C 175 120, 165 110, 155 110
    C 135 110, 120 120, 120 140
    C 120 160, 100 175, 80 175
    C 60 175, 40 165, 40 140
    Z
  " fill="url(#swaveGrad)"/>
  <!-- SWAVE SOCIAL text -->
  <text x="200" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">SWAVE SOCIAL</text>
</svg>
